<!doctype html>
<html lang="he" dir="rtl" translate="no">
  <head>
    <meta charset="UTF-8" />
    <!-- ניטרול הצעת התרגום של Chrome (המכשיר באנגלית, האפליקציה עברית בלבד) -->
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#5B9BD5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>MyMenu</title>
    <script type="text/javascript">
      // מפענח נתיב שהופנה מ-404.html (טריק ה-SPA ל-GitHub Pages) ומחזיר
      // את ה-URL האמיתי לפני שהאפליקציה עולה, כדי ש-react-router יראה
      // את הנתיב הנכון (למשל /mymenu/menu ולא /mymenu/?/menu).
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            '',
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
