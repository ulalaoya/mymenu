<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <title>MyMenu</title>
    <script type="text/javascript">
      // GitHub Pages אינו תומך ב-server-side routing, אז דף 404 הזה
      // מקודד את הנתיב המבוקש כ-query string ומפנה חזרה ל-index.html,
      // ששם סקריפט קטן (ב-index.html) מפענח ומחזיר את ה-URL האמיתי
      // דרך history.replaceState — כך ש-react-router-dom (BrowserRouter)
      // ממשיך לעבוד כרגיל, כולל רענון (F5) בתוך נתיב פנימי כמו /menu.
      // ראה: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // שומר על /mymenu/ (שם המאגר) בנתיב

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
