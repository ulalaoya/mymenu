<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- MyMenu app icon — צלחת עם לב אלמוגי, שמש צהובה, עלה כחול, נצנוץ. פלטת המותג. -->
  <defs>
    <clipPath id="round"><rect x="0" y="0" width="512" height="512" rx="112" ry="112"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect x="0" y="0" width="512" height="512" fill="#FAFBFC"/>

    <!-- שמש צהובה למעלה: קרניים + חצי-קשת -->
    <g stroke="#F5B041" stroke-width="13" stroke-linecap="round" fill="none">
      <line x1="256" y1="92"  x2="256" y2="128"/>
      <line x1="196" y1="104" x2="210" y2="138"/>
      <line x1="316" y1="104" x2="302" y2="138"/>
      <line x1="150" y1="140" x2="176" y2="166"/>
      <line x1="362" y1="140" x2="336" y2="166"/>
    </g>
    <path d="M188 196 a68 68 0 0 1 136 0" fill="none" stroke="#F5B041" stroke-width="15" stroke-linecap="round"/>

    <!-- קשת אלמוגית (swoosh) מסביב לצלחת מלמטה-ימין -->
    <path d="M388 250 a140 140 0 1 1 -128 -118" fill="none" stroke="#F0806C" stroke-width="17" stroke-linecap="round"/>

    <!-- עלה כחול מלמטה-שמאל -->
    <path d="M132 372 q-28 -32 8 -64 q28 32 -8 64 z" fill="#5B9BD5"/>
    <path d="M132 372 q8 -32 8 -58" fill="none" stroke="#DCEBFA" stroke-width="4" stroke-linecap="round"/>

    <!-- טבעת הצלחת הכחולה -->
    <circle cx="256" cy="272" r="116" fill="#FFFFFF" stroke="#5B9BD5" stroke-width="16"/>
    <!-- טבעת פנימית עדינה -->
    <circle cx="256" cy="272" r="87" fill="none" stroke="#DCEBFA" stroke-width="7"/>

    <!-- לב אלמוגי במרכז -->
    <path d="M256 326
             c-40 -28 -60 -52 -60 -78
             a30 30 0 0 1 60 -10
             a30 30 0 0 1 60 10
             c0 26 -20 50 -60 78 z" fill="#F0806C"/>

    <!-- נצנוץ צהוב מימין למעלה -->
    <path d="M392 150 l7 22 l22 7 l-22 7 l-7 22 l-7 -22 l-22 -7 l22 -7 z" fill="#F5B041"/>
  </g>
</svg>
